name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build darwin arm64 binary
        run: |
          set -euxo pipefail
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -ldflags="-s -w" -o dist/moneywiz-mcp-darwin-arm64 ./cmd/main.go

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneywiz-mcp-darwin-arm64
          path: dist/moneywiz-mcp-darwin-arm64

  build-darwin-amd64:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build darwin amd64 binary
        run: |
          set -euxo pipefail
          mkdir -p dist
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -ldflags="-s -w" -o dist/moneywiz-mcp-darwin-amd64 ./cmd/main.go

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneywiz-mcp-darwin-amd64
          path: dist/moneywiz-mcp-darwin-amd64

  release:
    runs-on: macos-latest
    needs:
      - build-darwin-arm64
      - build-darwin-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: moneywiz-mcp-darwin-arm64
          path: dist

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: moneywiz-mcp-darwin-amd64
          path: dist

      - name: Build universal binary
        run: |
          set -euxo pipefail
          lipo -create -output dist/moneywiz-mcp-darwin-universal dist/moneywiz-mcp-darwin-arm64 dist/moneywiz-mcp-darwin-amd64

      - name: Generate checksums
        run: |
          set -euxo pipefail
          cd dist
          shasum -a 256 moneywiz-mcp-darwin-arm64 moneywiz-mcp-darwin-amd64 moneywiz-mcp-darwin-universal > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/moneywiz-mcp-darwin-arm64
            dist/moneywiz-mcp-darwin-amd64
            dist/moneywiz-mcp-darwin-universal
            dist/SHA256SUMS
            scripts/import_db.sh
            scripts/uninstall.sh
